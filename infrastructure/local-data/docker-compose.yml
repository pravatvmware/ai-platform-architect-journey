version: '3.8'

services:
  vectordb:
    image: pgvector/pgvector:pg16
    container_name: enterprise-vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=enterprise_secure_password  # Change this in a real prod environment
      - POSTGRES_DB=rag_database
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data:
    name: pgvector_enterprise_data