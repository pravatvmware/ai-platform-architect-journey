version: '3.8'

services:
  vectordb:
    image: pgvector/pgvector:pg16
    container_name: enterprise-vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=rag_admin
      - POSTGRES_PASSWORD=enterprise_secure_password 
      - POSTGRES_DB=rag_database
    ports:
      - "5433:5432"  # Changed external port to 5433 to bypass local conflicts
    volumes:
      - pgvector_data_v2:/var/lib/postgresql/data # New volume name

volumes:
  pgvector_data_v2:
    name: pgvector_enterprise_data_v2